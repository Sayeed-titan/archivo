name: CI

# Runs on every push (any branch — including a throwaway branch pushed just
# to confirm this workflow itself is green) and on every PR into master.
# The Render deploy step at the bottom only fires for a push to master, and
# only if every check above it passed — see docs/testing.md for the full
# picture of how this replaces Render's previous "deploy on every push"
# behavior.
on:
  push:
  pull_request:
    branches: [master]

# Cancel a still-running run for the same branch/PR when a newer push
# arrives, instead of wasting runner time on a commit nobody cares about
# anymore.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: archivo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # A real Postgres service container, not the embedded `prisma dev`
      # engine used for local development — deliberately, since that engine
      # is documented (archivo/CLAUDE.md) to intermittently drop connections
      # under load, which would make CI flaky for reasons that have nothing
      # to do with whether the code under test is actually broken.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/archivo_test
      SHADOW_DATABASE_URL: postgres://postgres:postgres@localhost:5432/archivo_test
      SESSION_SECRET: ci-session-secret-not-for-production-use-only-in-ci
      APP_URL: http://localhost:3101
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci

      - name: Install Playwright's browser
        run: npx playwright install chromium --with-deps

      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:unit

      - name: Apply schema to the CI database
        run: npx prisma db push

      - run: npm run test:integration

      - name: Build (mirrors the Dockerfile's build stage)
        run: npm run build

      - name: E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      # Render's own "auto-deploy on push" is turned off (render.yaml sets
      # autoDeploy: false) — this is now the only path to production, and
      # only reachable once everything above has actually passed.
      - name: Deploy to Render
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set — see docs/testing.md for how to create it. Skipping deploy so this doesn't silently no-op forever unnoticed."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
