# Render Blueprint — provisions the whole Archivo stack in one place.
# Docs: https://render.com/docs/blueprint-spec
#
# What this creates:
#   • a Postgres database (managed, automatic daily backups on paid tiers)
#   • a Docker web service running the app (from ./Dockerfile)
#   • a persistent disk mounted at /app/storage so uploaded files survive
#     deploys and restarts (a serverless host CANNOT do this — it's the whole
#     reason we deploy as a long-running container)
#
# On first deploy, connect this repo as a Blueprint in the Render dashboard.
# Render reads this file and creates everything below. Fill in the values
# marked "sync: false" in the dashboard (they're secrets, not committed here).

databases:
  - name: archivo-db
    databaseName: archivo
    user: archivo
    # FREE tier: expires after 90 days (fine for testing). For production,
    # change plan to "basic-256mb" or higher (a paid plan, ~$7/mo) so the DB
    # is permanent and gets automated backups.
    plan: free

services:
  - type: web
    name: archivo
    runtime: docker
    dockerfilePath: ./Dockerfile
    # FREE tier: the instance SLEEPS after 15 min of inactivity and cold-starts
    # on the next request (~30s wake-up). Good enough for a test/demo.
    # For production change to "starter" (~$7/mo, always-on) — REQUIRED to
    # attach the persistent disk below (free instances can't have disks).
    plan: free
    region: oregon # pick the region closest to your users (oregon | frankfurt | singapore | ohio | virginia)
    branch: master
    # TEMPORARILY DISABLED for debugging a 502 that shows zero app-side logs
    # (i.e. Render's proxy isn't forwarding any traffic to the container,
    # even though the app's own logs show it booting and reporting "live").
    # If removing this makes the site reachable, the health check itself was
    # failing and blocking all routing — re-add once /login's real runtime
    # behavior on Render is confirmed working, don't leave this off long-term.
    # healthCheckPath: /login

    # preDeployCommand (`npx prisma migrate deploy`) requires a paid instance
    # plan — not supported on free. On free tier, run migrations manually
    # instead via Render Shell after each deploy that changes the schema:
    #   npx prisma migrate deploy
    # If you upgrade the web service off "free" later, uncomment this so
    # migrations apply automatically on every deploy:
    # preDeployCommand: npx prisma migrate deploy

    # Persistent disk for uploaded files + avatars + backups. Survives deploys.
    # NOTE: disks require a PAID instance plan — not supported on free tier,
    # so this is commented out. Uploaded files WILL be lost on every redeploy
    # and on restart from the free plan's sleep/wake cycle. Fine for a
    # UI-only demo, not for testing real upload persistence. Uncomment and
    # upgrade the web service plan below if you need files to persist.
    # disk:
    #   name: archivo-storage
    #   mountPath: /app/storage
    #   sizeGB: 1 # grow later as needed; you're billed per GB

    envVars:
      # ── Database ──────────────────────────────────────────────────────────
      # Render injects the full connection string from the database above.
      # sslmode=require is appended automatically for Render Postgres.
      - key: DATABASE_URL
        fromDatabase:
          name: archivo-db
          property: connectionString

      # ── Secrets (set these in the Render dashboard, not in git) ───────────
      # SESSION_SECRET: generate with `openssl rand -base64 32`. If you use
      # `generateValue: true`, Render creates a strong random value for you
      # and keeps it stable across deploys.
      - key: SESSION_SECRET
        generateValue: true

      # ── App runtime config ────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      # APP_URL: the public URL Render assigns (https://archivo.onrender.com or
      # your custom domain). Used to build links inside notification emails.
      # Set this AFTER the first deploy once you know the URL.
      - key: APP_URL
        sync: false

      # ── Email (optional — leave SMTP_HOST unset to disable email entirely) ─
      # The app no-ops email if SMTP_HOST is absent; in-app notifications still
      # work. To enable, point these at a real provider (SendGrid, SES, etc.).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # ── Google Workspace "open in" connector (optional) ───────────────────
      # Only needed if you use the Settings → Integrations Connect flow.
      # GOOGLE_REDIRECT_URI must be https://<your-app-url>/api/integrations/google/callback
      # and match exactly what you register in Google Cloud Console.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
